<script src="https://unpkg.com/lucide@0.454.0/dist/umd/lucide.min.js"></script><script>"use strict";
var WMO={0:{l:"快晴",i:"sun"},1:{l:"晴れ",i:"sun"},2:{l:"薄曇り",i:"cloudsun"},3:{l:"曇り",i:"cloud"},45:{l:"霧",i:"fog"},48:{l:"霧氷",i:"fog"},51:{l:"弱い霧雨",i:"drizzle"},53:{l:"霧雨",i:"drizzle"},55:{l:"強い霧雨",i:"drizzle"},56:{l:"着氷性霧雨",i:"drizzle"},57:{l:"着氷性霧雨",i:"drizzle"},61:{l:"弱い雨",i:"rain"},63:{l:"雨",i:"rain"},65:{l:"強い雨",i:"rain"},66:{l:"着氷性の雨",i:"rain"},67:{l:"着氷性の雨",i:"rain"},71:{l:"弱い雪",i:"snow"},73:{l:"雪",i:"snow"},75:{l:"強い雪",i:"snow"},77:{l:"霧雪",i:"snow"},80:{l:"弱いにわか雨",i:"showers"},81:{l:"にわか雨",i:"showers"},82:{l:"激しいにわか雨",i:"showers"},85:{l:"にわか雪",i:"snow"},86:{l:"強いにわか雪",i:"snow"},95:{l:"雷雨",i:"thunder"},96:{l:"雷雨(雹)",i:"thunder"},99:{l:"雷雨(雹)",i:"thunder"}};function wmo(c){ return WMO[c]||WMO[3]; }var LIC={sun:"sun",cloudsun:"cloud-sun",cloud:"cloud",fog:"cloud-fog",drizzle:"cloud-drizzle",rain:"cloud-rain",snow:"cloud-snow",showers:"cloud-rain-wind",thunder:"cloud-lightning"};function iconColor(c){ var i=wmo(c).i;  if(i==="sun")return"#F4B44C"; if(i==="cloudsun")return"#C9B27A"; if(i==="snow")return"#CFE3F5";  if(i==="drizzle"||i==="rain"||i==="showers"||i==="thunder")return"#54B6EC"; return"#8496B4"; }function ic(name,size,color){ return '<span class="ic" style="width:'+size+'px;height:'+size+'px;'+(color?'color:'+color+';':'')+'"><i data-lucide="'+name+'"></i></span>'; }function wIcon(code,size){ return ic(LIC[wmo(code).i]||"cloud",size,iconColor(code)); }

function fetchForecast(lat,lon){  var url="https://api.open-meteo.com/v1/forecast?latitude="+lat+"&longitude="+lon    +"&hourly=temperature_2m,apparent_temperature,precipitation_probability,precipitation,weather_code,wind_speed_10m,relative_humidity_2m"    +"&daily=sunrise,sunset&forecast_days=3&wind_speed_unit=ms&timezone=Asia%2FTokyo";  return fetch(url).then(function(r){ if(!r.ok) throw new Error("f"); return r.json(); }).then(function(j){    var h=j.hourly, sun={};    (j.daily&&j.daily.time||[]).forEach(function(d,i){ sun[d]={sunrise:j.daily.sunrise[i],sunset:j.daily.sunset[i]}; });    var byDate={};    h.time.forEach(function(t,i){ var date=t.slice(0,10); (byDate[date]=byDate[date]||[]).push({      time:t,hour:+t.slice(11,13),temp:h.temperature_2m[i],appt:h.apparent_temperature?h.apparent_temperature[i]:null,      code:h.weather_code[i],precip:h.precipitation_probability?h.precipitation_probability[i]:null,      mm:h.precipitation?h.precipitation[i]:0,wind:h.wind_speed_10m?h.wind_speed_10m[i]:null,humid:h.relative_humidity_2m?h.relative_humidity_2m[i]:null}); });    var days=Object.keys(byDate).sort().slice(0,3).map(function(date){ var hrs=byDate[date]; var temps=hrs.map(function(x){return x.temp;});      return {date:date,hours:hrs,hi:Math.max.apply(null,temps),lo:Math.min.apply(null,temps),        sunrise:sun[date]&&sun[date].sunrise,sunset:sun[date]&&sun[date].sunset}; });    return {days:days,updatedAt:Date.now()};  });}function geocode(name){  var url="https://geocoding-api.open-meteo.com/v1/search?name="+encodeURIComponent(name)+"&count=6&language=ja&format=json";  return fetch(url).then(function(r){ if(!r.ok) throw new Error("g"); return r.json(); }).then(function(j){ return j.results||[]; });}
var STORE="tenki_locations_v1", MAX=6;var DEFAULTS=[  {name:"飯能市",region:"埼玉県",lat:35.8557,lon:139.3278},  {name:"秩父市",region:"埼玉県",lat:35.9909,lon:139.0857},  {name:"東京",region:"東京都",lat:35.6895,lon:139.6917},  {name:"熊谷市",region:"埼玉県",lat:36.1470,lon:139.3886}];function loadLoc(){ try{ var v=localStorage.getItem(STORE); if(v) return JSON.parse(v);}catch(e){} return null; }function saveLoc(l){ try{ localStorage.setItem(STORE,JSON.stringify(l)); }catch(e){} }
var state={ locations:loadLoc()||DEFAULTS, forecasts:[], sel:0, day:0, now:tokyoParts(),  editSlot:null, q:"", results:[], searching:false, lastHour:null };state.forecasts=state.locations.map(function(){return null;});

function spark(day){  var temps=day.hours.map(function(h){return h.temp;});  var appts=day.hours.map(function(h){return h.appt==null?h.temp:h.appt;});  var all=temps.concat(appts); var min=Math.min.apply(null,all),max=Math.max.apply(null,all),rng=(max-min)||1,n=temps.length;  function X(i){return (i/(n-1))*100;} function Y(t){return 88-((t-min)/rng)*74;}  function line(a){return a.map(function(t,i){return X(i)+","+Y(t);}).join(" ");}  var k=hourKey(state.now); var ni=day.hours.findIndex(function(h){return h.time===k;});  var nowLine=ni>=0? '<line x1="'+X(ni)+'" y1="0" x2="'+X(ni)+'" y2="100" stroke="#F4B44C" stroke-width="1" stroke-dasharray="2 2" vector-effect="non-scaling-stroke" opacity="0.7"/>' : '';  return '<div class="spark"><svg viewBox="0 0 100 100" preserveAspectRatio="none">'    +'<defs><linearGradient id="tg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F4B44C" stop-opacity="0.26"/><stop offset="100%" stop-color="#F4B44C" stop-opacity="0"/></linearGradient></defs>'    +'<polygon points="0,100 '+line(temps)+' 100,100" fill="url(#tg)"/>'    +'<polyline points="'+line(appts)+'" fill="none" stroke="#54B6EC" stroke-width="1.3" stroke-dasharray="3 2.5" vector-effect="non-scaling-stroke" stroke-linejoin="round" opacity="0.85"/>'    +'<polyline points="'+line(temps)+'" fill="none" stroke="#F4B44C" stroke-width="1.7" vector-effect="non-scaling-stroke" stroke-linejoin="round" stroke-linecap="round"/>'    +nowLine+'</svg>'    +'<div class="lg"><span style="color:#F4B44C">― 気温</span><span style="color:#54B6EC">┄ 体感</span></div>'    +'<span class="mx tnum">'+Math.round(max)+'°</span><span class="mn tnum">'+Math.round(min)+'°</span></div>';}
function render(){  var s=state, k=hourKey(s.now);  var html="";  html+='<header><div><div class="title">天気観測</div><div class="sub">外出のための毎時予報 ・ 3日間 ・ 毎時更新</div></div>'    +'<div class="hbtns">'    +'<button class="hbtn" data-action="notify" aria-label="通知">'+ic("bell",14)+'</button>'    +'<button class="hbtn" data-action="refresh" aria-label="更新">'+ic("refresh-cw",14)+'<span class="tnum" id="clock">'+String(s.now.hour).padStart(2,"0")+':'+String(s.now.minute).padStart(2,"0")+'</span></button>'    +'</div></header>';  html+='<div class="cards scroll">';  s.locations.forEach(function(loc,i){    var fc=s.forecasts[i], c=getCurrent(fc), on=i===s.sel;    html+='<button class="card'+(on?" on":"")+'" data-action="card" data-idx="'+i+'">'      +'<div class="nm">'+ic("map-pin",11)+'<span>'+esc(loc.name)+'</span></div>';    if(c){ html+='<div style="display:flex;align-items:center;justify-content:space-between">'      +'<div><div class="tp tnum">'+Math.round(c.temp)+'<small>°</small></div><div class="fl tnum">体感 '+Math.round(c.appt==null?c.temp:c.appt)+'°</div></div>'      +wIcon(c.code,22)+'</div>';    } else { html+='<div style="font-size:12px;color:var(--faint);'+(fc&&fc.error?"":"animation:pulse 1.4s infinite")+'">'+(fc&&fc.error?"取得失敗":"取得中…")+'</div>'; }    html+='</button>';  });  if(s.locations.length<MAX) html+='<button class="add" data-action="add" aria-label="地点を追加">'+ic("plus",20)+'</button>';  html+='</div>';  html+='<div class="editrow"><button class="link" data-action="edit">'+ic("pencil",12)+' この地点を変更</button></div>';  if(s.editSlot!==null){    var isNew=s.editSlot==="new";    html+='<div class="panel fade"><div class="ph"><div>'+(isNew?"新しい地点を追加":('<b>'+esc(s.locations[s.editSlot]?s.locations[s.editSlot].name:"")+'</b> を変更'))+'</div><div style="display:flex;gap:8px;align-items:center">';    if(!isNew && s.locations.length>1) html+='<button class="del" data-action="remove">'+ic("trash-2",12)+' 削除</button>';    html+='<button class="x" data-action="close">'+ic ><div class="d1">'+label+'</div>'        +'<div class="d2 tnum">'+md(d.date)+'（'+weekday(d.date)+'）</div>'        +'<div class="d3 tnum"><span class="hi">'+Math.round(d.hi)+'°</span><span class="lo"> / '+Math.round(d.lo)+'°</span></div></button>';    });    html+='</div>';    html+='<div class="sun"><span style="color:#F4B44C">'+ic("sunrise",15)+'日の出 '+hhmm(selDay.sunrise)+'</span><span class="bar"></span><span style="color:#B79BD9">'+ic("sunset",15)+'日の入 '+hhmm(selDay.sunset)+'</span></div>';    html+=spark(selDay);    html+='<div class="hlist"><div class="hbody scroll">';    selDay.hours.forEach(function(h,i){      var isNow=h.time===k;      var night=srH!=null&&ssH!=null&&(h.hour<Math.floor(srH)||h.hour>Math.floor(ssH));      var cl=clothing(h.appt), umb=needUmbrella(h.precip,h.mm);      if(srH!=null&&h.hour===Math.floor(srH)) html+='<div class="mark" style="color:#F4B44C">'+ic("sunrise",13)+'<span>日の出 '+hhmm(selDay.sunrise)+'</span></div>';      if(ssH!=null&&h.hour===Math.floor(ssH)) html+='<div class="mark" style="color:#B79BD9">'+ic("sunset",13)+'<span>日の入 '+hhmm(selDay.sunset)+'</span></div>';      html+='<div class="hr'+(isNow?" now":"")+(night?" night":"")+'"'+(isNow?' id="now-row"':'')+'>'        +'<div class="t tnum">'+(isNow?"現在":h.hour+"時")+'</div>'+wIcon(h.code,24)        +'<div class="mid"><div class="l1"><b class="tnum">'+Math.round(h.temp)+'°</b><em class="tnum">体感 '+Math.round(h.appt==null?h.temp:h.appt)+'°</em></div>'        +'<div class="l2 tnum"><span class="'+((h.precip||0)>0?"on":"off")+'">降水 '+(h.precip||0)+'%</span><span class="'+((h.mm||0)>0?"on":"off")+'">'+(h.mm||0).toFixed(1)+'mm</span>'        +(umb?'<span style="display:flex;align-items:center;gap:3px;color:#54B6EC">'+ic("umbrella",12)+'傘</span>':'')+'</div></div>'        +'<div class="cloth"><span class="dot" style="background:'+TONE[cl.tone]+'"></span>'+ic("shirt",13,"#8496B4")+'<span>'+cl.t+'</span></div></div>';    });    html+='</div></div>';    html+='<div class="foot">データ：Open- function doSearch(){  var inp=document.getElementById("search-input"); if(!inp) return;  state.q=inp.value.trim(); if(!state.q) return;  state.searching=true; render();  geocode(state.q).then(function(r){ state.results=r; state.searching=false; render(); })    .catch(function(){ state.results=[]; state.searching=false; render(); });}function pick(i){  var r=state.results[i]; if(!r) return;  var item={name:r.name,region:[r.admin1,r.country].filter(Boolean).join(" "),lat:r.latitude,lon:r.longitude};  if(state.editSlot==="new"){ state.locations=state.locations.concat([item]); state.sel=state.locations.length-1; }  else { state.locations=state.locations.map(function(l,k){ return k===state.editSlot?item:l; }); }  saveLoc(state.locations); state.editSlot=null; state.q=""; state.results=[]; fetchAll();}function removeSlot(){  if(state.locations.length<=1) return;  var idx=state.editSlot;  state.locations=state.locations.filter(function(_,k){ return k!==idx; });  saveLoc(state.locations); state.sel=Math.min(state.sel,state.locations.length-1);  state.editSlot=null; state.q=""; state.results=[]; fetchAll();}function notify(){  try{    if(!("Notification" in window)){ alert("この端末は通知に対応していません。"); return; }    var run=function(p){ if(p!=="granted"){ alert("通知が許可されていません。"); return; }      var fc=state.forecasts[state.sel], c=getCurrent(fc), loc=state.locations[state.sel]; if(!c) return;      var cl=clothing(c.appt);      var body=Math.round(c.temp)+"° 体感"+Math.round(c.appt==null?c.temp:c.appt)+"° / 降水"+(c.precip||0)+"% / "+cl.t;      var opts={body:body,icon:"./icon-192.png",badge:"./icon-192.png",tag:"tenki"};      if(navigator.serviceWorker&&navigator.serviceWorker.getRegistration){        navigator.serviceWorker.getRegistration().then(function(reg){ if(reg&&reg.showNotification) reg.showNotification(loc.name+"の天気",opts); else new Notification(loc.name+"の天気",opts); });      } else { new Notification(loc.name+"の天気",opts); }    };    if(Notification.permission==="granted") run(" var app=document.getElementById("app");app.addEventListener("click",function(e){  var el=e.target.closest("[data-action]"); if(!el) return;  var a=el.dataset.action, idx=el.dataset.idx!==undefined?+el.dataset.idx:null;  if(a==="card"){ state.sel=idx; state.day=0; render(); }  else if(a==="add"){ if(state.locations.length<MAX){ state.editSlot="new"; state.q=""; state.results=[]; render(); } }  else if(a==="edit"){ state.editSlot=state.editSlot===null?state.sel:null; state.q=""; state.results=[]; render(); }  else if(a==="close"){ state.editSlot=null; render(); }  else if(a==="refresh"){ fetchAll(); }  else if(a==="day"){ state.day=idx; render(); }  else if(a==="search"){ doSearch(); }  else if(a==="pick"){ pick(idx); }  else if(a==="remove"){ removeSlot(); }  else if(a==="notify"){ notify(); }});app.addEventListener("keydown",function(e){ if(e.target.id==="search-input"&&e.key==="Enter") doSearch(); });
